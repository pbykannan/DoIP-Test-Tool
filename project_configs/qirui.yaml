flash:
  # -----------------------------
  # 以下是刷写流程配置（不会显示在诊断树）
  # -----------------------------
  memory_address: 134217728
  address_format: 32
  memorysize_format: 32
  override_block_payload: null
  # 34 应答后稍等再发 36（秒）；仍异常可试 0.5～1.0
  post_request_download_delay_sec: 0.35
  # L1 解锁后稍等再解 L3（秒）；仍异常可试 0.5～1.0
  security_l1_to_l3_delay_sec: 0.35
  transfer_exit_data: null
  # Pre-programming
  pre_transfer_raw_requests:
    - "1001"
    - payload: "1083"
      addressing: functional
    - "1003"
    - "31010203"
    - payload: "8582"
      addressing: functional
    - payload: "288303"
      addressing: functional
    - "22F189"
  pre_transfer_routines: []
  # Programming session
  diagnostic_sessions_before_download:
    - programming
  # SecurityAccess：须 lock→L1→L3；只写 0x11 时程序也会自动先解 0x01
  security_access_levels_before_download:
    - 0x01
    - 0x11
  # 2E F184 fingerprint（v116 固定 19 bytes）
  fingerprint_did: 0xF184
  fingerprint_data: "112233445566778899AABBCCDDEEFF00112233"
  # Post-download routines
  post_transfer_routines:
    - routine_id: 0xFF01
      control_type: 1
      data: ""
    - routine_id: 0xDD03
      control_type: 1
      data: ""
  # Post-programming：DD03 完成后 TBOX 自行复位，不再发 11 01
  post_transfer_raw_requests: []
  # DD03 触发的自动复位后，等对端升级就绪再起 TCP（实测可能数分钟量级）
  post_transfer_reconnect_delay_sec: 350
  # 重连后继续（扩展会话清理等）
  post_transfer_after_reconnect_raw_requests:
    - "1003"
    - "14FFFFFF"
    - payload: "8581"
      addressing: functional
    - payload: "1081"
      addressing: functional