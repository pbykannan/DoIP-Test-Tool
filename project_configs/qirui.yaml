# 完整配置模板：可按项目需要裁剪；不写的字段将使用代码默认值
network:
  host: "172.168.2.30"
  tcp_port: 13400
  udp_port: 13400
  client_bind_ip: null

doip:
  client_logical_address: 0x0E80
  server_logical_address: 0x0001
  protocol_version: 3
  socket_read_timeout: 15
  activation_type: "Default"
  activation_disabled: false
  vm_specific: 0
  uds_addressing: "physical"
  functional_logical_address: 0xE400

uds:
  request_timeout: 50
  p2_timeout: 1
  p2_star_timeout: 5
  server_address_format: null
  server_memorysize_format: null
  # 0x27：level 0x01 / 0x11 各 16 字节 AES-128-CMAC 密钥（TBOX 正式密钥 2024-04）
  security_key_level1: "AB235823A5C6964796C412448AC3252E"
  security_key_level3: "69E5CA4C3DBF5366F720094D883EC456"

diagnostics:
