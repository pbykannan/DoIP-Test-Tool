          comment: "清除全部 DTC"
    - sid: 0x19
      items:
        - request: "1901FF"
          comment: "按状态掩码读 DTC 数量"
        - request: "1902FF"
          comment: "按状态掩码读 DTC 列表"
        - request: "1903"
          comment: "读快照标识"
        - request: "1904FFFFFF01"
          comment: "按 DTC 读快照记录"
        - request: "1906FFFFFF"
          comment: "按 DTC 读扩展数据"
        - request: "190A09"
          comment: "读支持的 DTC"
    - sid: 0x22
